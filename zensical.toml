[project]
site_name = "Technical Writing KB"
site_description = "A modern technical writing guide exploring shift-left methodologies, documentation frameworks, and advanced tools for technical writers."
site_url = "https://vaishvanara.github.io/techwritingkb/"
repo_name = "vaishvanara/techwritingkb"
repo_url = "https://github.com/vaishvanara/techwritingkb"
copyright = """
©️ 2026 Technical Writing KB &bull;
<a href="/techwritingkb/pages/about/">About</a> &bull;
<a href="/techwritingkb/pages/privacy/">Privacy</a> &bull;
<a href="/techwritingkb/pages/terms-of-use/">Terms of Use</a>
"""

